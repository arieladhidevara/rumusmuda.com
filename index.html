<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rumus Muda is building a new kind of tech education for people who are already great at what they do."
    />
    <title>Rumus Muda Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        background: #ffffff;
        color: #171411;
        font-family:
          "Cormorant Garamond", "Iowan Old Style", "Palatino Linotype",
          Palatino, Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(251, 247, 239, 0.78) 100%),
          #ffffff;
        margin: 0;
        min-width: 320px;
      }

      .fallback-coming-soon {
        align-items: center;
        display: grid;
        isolation: isolate;
        min-height: 100svh;
        overflow: hidden;
        padding: clamp(2rem, 5vw, 5rem);
        place-items: center;
        position: relative;
        text-align: center;
      }

      .fallback-coming-soon::before {
        background:
          linear-gradient(90deg, rgba(23, 20, 17, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(23, 20, 17, 0.032) 1px, transparent 1px),
          transparent;
        background-size: 5rem 5rem;
        content: "";
        inset: 0;
        mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
        opacity: 0.42;
        pointer-events: none;
        position: absolute;
        z-index: -1;
      }

      .fallback-coming-soon::after {
        background:
          radial-gradient(circle at 50% 48%, rgba(98, 199, 238, 0.44), transparent 24%),
          radial-gradient(circle at 42% 42%, rgba(166, 94, 255, 0.58), transparent 34%),
          radial-gradient(circle at 52% 52%, rgba(16, 20, 153, 0.56), transparent 58%),
          radial-gradient(circle, rgba(255, 255, 255, 0.88), transparent 72%);
        border-radius: 999rem;
        content: "";
        filter: saturate(1.08) contrast(1.02);
        height: min(78vmin, 43rem);
        left: 50%;
        opacity: 0.86;
        pointer-events: none;
        position: absolute;
        top: 47%;
        transform: translate(-50%, -50%);
        width: min(78vmin, 43rem);
        z-index: 0;
      }

      .fallback-coming-soon p {
        margin: 0;
      }

      .fallback-copy {
        max-width: 52rem;
        position: relative;
        text-shadow: 0 0.2rem 2.5rem rgba(255, 255, 255, 0.94);
        transform: translateY(1.2rem);
        z-index: 2;
      }

      .fallback-coming-soon h1 {
        color: #14110f;
        font-size: clamp(4.6rem, 10.5vw, 10.8rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.86;
        margin: 0;
      }

      .fallback-status {
        color: rgba(20, 17, 15, 0.62);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: clamp(0.86rem, 1.25vw, 1rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 1;
        margin: 0 0 clamp(0.9rem, 2vw, 1.3rem);
        text-transform: uppercase;
      }

      .fallback-promise {
        color: rgba(20, 17, 15, 0.72);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: clamp(1rem, 1.45vw, 1.28rem);
        font-weight: 400;
        line-height: 1.58;
        margin: clamp(1.1rem, 2.6vw, 1.8rem) auto 0;
        max-width: 39rem;
      }

      @media (max-width: 820px) {
        .fallback-coming-soon {
          padding: 2rem 1.35rem;
          place-items: center;
          text-align: center;
        }

        .fallback-coming-soon::after {
          height: 112vmin;
          opacity: 0.72;
          top: 45%;
          width: 112vmin;
        }

        .fallback-copy {
          transform: translateY(1rem);
        }

        .fallback-coming-soon h1 {
          font-size: clamp(4rem, 19vw, 6.9rem);
        }

        .fallback-promise {
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-coming-soon">
        <section class="fallback-copy" aria-label="Rumus Muda coming soon">
          <p class="fallback-status">Coming Soon</p>
          <h1>Rumus Muda</h1>
          <p class="fallback-promise">
            Building a new kind of tech education for people who are already
            great at what they do
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
