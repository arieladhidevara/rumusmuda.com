<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rumus Muda is building a new kind of tech education for people who are already great at what they do."
    />
    <title>Rumus Muda Coming Soon</title>
    <style>
      :root {
        background: #05060c;
        color: #f7f4ee;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at 72% 42%, rgba(156, 67, 254, 0.36), transparent 20rem),
          radial-gradient(circle at 78% 48%, rgba(76, 194, 233, 0.26), transparent 23rem),
          linear-gradient(135deg, #05060c 0%, #090b13 52%, #05060c 100%);
        margin: 0;
        min-width: 320px;
      }

      .fallback-coming-soon {
        align-items: center;
        display: grid;
        isolation: isolate;
        min-height: 100svh;
        overflow: hidden;
        padding: clamp(2rem, 6vw, 6rem);
        place-items: center start;
        position: relative;
        text-align: left;
      }

      .fallback-coming-soon::before {
        background:
          radial-gradient(circle at 50% 50%, rgba(247, 244, 238, 0.08), transparent 0.08rem),
          transparent;
        background-size: 1.35rem 1.35rem;
        content: "";
        inset: 0;
        opacity: 0.34;
        pointer-events: none;
        position: absolute;
        z-index: -2;
      }

      .fallback-coming-soon::after {
        background:
          radial-gradient(circle at 50% 48%, rgba(98, 199, 238, 0.5), transparent 22%),
          radial-gradient(circle at 42% 42%, rgba(166, 94, 255, 0.72), transparent 32%),
          radial-gradient(circle at 52% 52%, rgba(16, 20, 153, 0.9), transparent 56%);
        border-radius: 999rem;
        content: "";
        filter: blur(0.15rem) saturate(1.1);
        height: min(92vmin, 54rem);
        left: 68%;
        opacity: 0.72;
        pointer-events: none;
        position: absolute;
        top: 48%;
        transform: translate(-50%, -50%);
        width: min(92vmin, 54rem);
        z-index: -1;
      }

      .fallback-coming-soon p {
        margin: 0;
      }

      .fallback-copy {
        max-width: 54rem;
      }

      .fallback-coming-soon h1 {
        color: #fffaf2;
        font-size: clamp(3.75rem, 8.2vw, 8.8rem);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.92;
        margin: 0;
      }

      .fallback-coming-soon h1 span {
        display: block;
      }

      .fallback-coming-soon h1 span:first-child {
        color: rgba(247, 244, 238, 0.9);
        font-size: 0.52em;
        font-weight: 650;
        line-height: 1.02;
        margin-bottom: 0.22em;
      }

      .fallback-promise {
        color: rgba(247, 244, 238, 0.78);
        font-size: clamp(1.05rem, 1.7vw, 1.55rem);
        font-weight: 450;
        line-height: 1.42;
        margin-top: clamp(1.4rem, 3vw, 2.1rem);
        max-width: 38rem;
      }

      @media (max-width: 820px) {
        .fallback-coming-soon {
          padding: 2rem 1.35rem;
          place-items: center;
          text-align: center;
        }

        .fallback-coming-soon::after {
          height: 116vmin;
          left: 50%;
          opacity: 0.62;
          top: 38%;
          width: 116vmin;
        }

        .fallback-coming-soon h1 {
          font-size: clamp(3.3rem, 17vw, 6.2rem);
        }

        .fallback-promise {
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-coming-soon">
        <section class="fallback-copy" aria-label="Rumus Muda coming soon">
          <h1>
            <span>Rumus Muda</span>
            <span>Coming Soon</span>
          </h1>
          <p class="fallback-promise">
            Building a new kind of tech education for people who are already
            great at what they do
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
