<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rumus Muda is building a new kind of tech education for people who are already great at what they do."
    />
    <title>Rumus Muda Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        background: #ffffff;
        color: #16120f;
        font-family:
          "Cormorant Garamond", "Iowan Old Style", "Palatino Linotype",
          Palatino, Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        background: #ffffff;
        margin: 0;
        min-width: 320px;
      }

      .fallback-coming-soon {
        align-items: center;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        gap: clamp(0.75rem, 2.2vh, 1.5rem);
        justify-content: center;
        min-height: 100svh;
        overflow: hidden;
        padding: clamp(1.2rem, 3.5vh, 2.6rem) clamp(1.25rem, 4vw, 3rem);
        text-align: center;
      }

      .fallback-coming-soon::before {
        aspect-ratio: 1;
        background:
          radial-gradient(circle at 51% 45%, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.62) 26%, transparent 42%),
          radial-gradient(circle at 28% 38%, rgba(94, 214, 238, 0.78), transparent 42%),
          radial-gradient(circle at 72% 34%, rgba(226, 122, 255, 0.72), transparent 42%),
          radial-gradient(circle at 48% 76%, rgba(91, 132, 245, 0.68), transparent 45%);
        border-radius: 999rem;
        box-shadow:
          inset 0 -1.1rem 1.9rem rgba(82, 126, 245, 0.38),
          inset 0 0.45rem 1rem rgba(255, 255, 255, 0.9),
          0 0.25rem 0.9rem rgba(105, 174, 239, 0.28);
        content: "";
        display: block;
        filter: saturate(1.04) contrast(1.02);
        height: min(67vh, 39rem);
        max-height: 39rem;
        max-width: 39rem;
        min-height: 18rem;
        min-width: 18rem;
        width: min(67vh, 72vw, 39rem);
      }

      .fallback-copy {
        max-width: 48rem;
      }

      .fallback-coming-soon h1 {
        color: #171310;
        font-size: clamp(2.35rem, 4.9vw, 4.85rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.92;
        margin: 0;
      }

      .fallback-brand {
        color: rgba(22, 18, 15, 0.62);
        font-size: clamp(1.05rem, 1.6vw, 1.35rem);
        font-weight: 400;
        line-height: 1;
        margin: 0 0 0.45rem;
      }

      .fallback-promise {
        color: rgba(22, 18, 15, 0.66);
        font-size: clamp(1.08rem, 1.55vw, 1.34rem);
        font-weight: 400;
        line-height: 1.42;
        margin: clamp(0.85rem, 1.8vw, 1.25rem) auto 0;
        max-width: 36rem;
      }

      @media (max-width: 820px) {
        .fallback-coming-soon {
          gap: 1rem;
          padding: 1.25rem;
        }

        .fallback-coming-soon::before {
          height: min(58vh, 88vw);
          min-height: 15rem;
          min-width: 15rem;
          width: min(58vh, 88vw);
        }

        .fallback-coming-soon h1 {
          font-size: clamp(2.15rem, 10vw, 4rem);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-coming-soon">
        <section class="fallback-copy" aria-label="Rumus Muda coming soon">
          <p class="fallback-brand">Rumus Muda</p>
          <h1>Coming Soon</h1>
          <p class="fallback-promise">
            Building a new kind of tech education for people who are already
            great at what they do
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
