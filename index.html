<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rumus Muda is building a new kind of tech education for people who are already great at what they do."
    />
    <title>Rumus Muda Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        background: #ffffff;
        color: #171411;
        font-family:
          "Cormorant Garamond", "Iowan Old Style", "Palatino Linotype",
          Palatino, Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at 50% 46%, rgba(117, 198, 224, 0.16), transparent 23rem),
          radial-gradient(circle at 50% 48%, rgba(166, 94, 255, 0.12), transparent 25rem),
          linear-gradient(180deg, #ffffff 0%, #fffaf3 100%);
        margin: 0;
        min-width: 320px;
      }

      .fallback-coming-soon {
        align-items: center;
        display: grid;
        isolation: isolate;
        min-height: 100svh;
        overflow: hidden;
        padding: clamp(2rem, 5vw, 4.5rem);
        place-items: center;
        position: relative;
        text-align: center;
      }

      .fallback-coming-soon::before {
        background:
          linear-gradient(90deg, rgba(23, 20, 17, 0.045) 1px, transparent 1px),
          linear-gradient(0deg, rgba(23, 20, 17, 0.035) 1px, transparent 1px),
          transparent;
        background-size: 5.5rem 5.5rem;
        content: "";
        inset: 0;
        mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
        opacity: 0.5;
        pointer-events: none;
        position: absolute;
        z-index: -1;
      }

      .fallback-coming-soon::after {
        background:
          radial-gradient(circle at 50% 48%, rgba(98, 199, 238, 0.44), transparent 24%),
          radial-gradient(circle at 42% 42%, rgba(166, 94, 255, 0.58), transparent 34%),
          radial-gradient(circle at 52% 52%, rgba(16, 20, 153, 0.56), transparent 58%),
          radial-gradient(circle, rgba(255, 255, 255, 0.88), transparent 72%);
        border-radius: 999rem;
        content: "";
        filter: blur(0.15rem) saturate(1.1);
        height: min(80vmin, 44rem);
        left: 50%;
        opacity: 0.82;
        pointer-events: none;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(80vmin, 44rem);
        z-index: 0;
      }

      .fallback-coming-soon p {
        margin: 0;
      }

      .fallback-copy {
        max-width: 48rem;
        position: relative;
        z-index: 2;
      }

      .fallback-coming-soon h1 {
        color: #171411;
        font-size: clamp(4rem, 9vw, 8.6rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.82;
        margin: 0;
      }

      .fallback-coming-soon h1 span {
        display: block;
      }

      .fallback-coming-soon h1 span:first-child {
        color: #2a241f;
        font-size: 0.48em;
        font-style: italic;
        font-weight: 400;
        line-height: 1;
        margin-bottom: 0.32em;
      }

      .fallback-promise {
        color: rgba(23, 20, 17, 0.76);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: clamp(1rem, 1.55vw, 1.32rem);
        font-weight: 400;
        line-height: 1.55;
        margin: clamp(1.35rem, 3vw, 2.1rem) auto 0;
        max-width: 37rem;
      }

      @media (max-width: 820px) {
        .fallback-coming-soon {
          padding: 2rem 1.35rem;
          place-items: center;
          text-align: center;
        }

        .fallback-coming-soon::after {
          height: 106vmin;
          opacity: 0.74;
          top: 48%;
          width: 106vmin;
        }

        .fallback-coming-soon h1 {
          font-size: clamp(3.55rem, 18vw, 6.5rem);
        }

        .fallback-promise {
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-coming-soon">
        <section class="fallback-copy" aria-label="Rumus Muda coming soon">
          <h1>
            <span>Rumus Muda</span>
            <span>Coming Soon</span>
          </h1>
          <p class="fallback-promise">
            Building a new kind of tech education for people who are already
            great at what they do
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
