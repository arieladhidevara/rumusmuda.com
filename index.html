<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rumus Muda is building a new kind of tech education for people who are already great at what they do."
    />
    <title>Rumus Muda Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        background: #ffffff;
        color: #16120f;
        font-family:
          "Cormorant Garamond", "Iowan Old Style", "Palatino Linotype",
          Palatino, Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        background: #ffffff;
        margin: 0;
        min-width: 320px;
      }

      .fallback-coming-soon {
        align-items: center;
        background: #ffffff;
        display: grid;
        justify-content: center;
        min-height: 100svh;
        overflow: hidden;
        padding: clamp(1.2rem, 3.5vh, 2.6rem) clamp(1.25rem, 4vw, 3rem);
        place-items: center;
        position: relative;
        text-align: center;
      }

      .fallback-coming-soon::before {
        background:
          radial-gradient(circle at 50% 50%, rgba(38, 140, 255, 0.1), transparent 34rem),
          repeating-linear-gradient(
            176deg,
            transparent 0 0.78rem,
            rgba(38, 140, 255, 0.36) 0.84rem 0.98rem,
            transparent 1.2rem 1.92rem
          );
        content: "";
        height: 100svh;
        left: 50%;
        opacity: 0.5;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 100vw;
        z-index: 0;
      }

      .fallback-copy {
        max-width: 48rem;
        position: relative;
        z-index: 1;
      }

      .fallback-coming-soon h1 {
        color: #171310;
        font-size: clamp(2.35rem, 4.9vw, 4.85rem);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 0.92;
        margin: 0;
      }

      .fallback-brand {
        color: rgba(22, 18, 15, 0.62);
        font-size: clamp(1.05rem, 1.6vw, 1.35rem);
        font-weight: 400;
        line-height: 1;
        margin: 0 0 0.45rem;
      }

      .fallback-promise {
        color: rgba(22, 18, 15, 0.66);
        font-size: clamp(1.08rem, 1.55vw, 1.34rem);
        font-weight: 400;
        line-height: 1.42;
        margin: clamp(0.85rem, 1.8vw, 1.25rem) auto 0;
        max-width: 36rem;
      }

      @media (max-width: 820px) {
        .fallback-coming-soon {
          padding: 1.25rem;
        }

        .fallback-coming-soon h1 {
          font-size: clamp(2.15rem, 10vw, 4rem);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-coming-soon">
        <section class="fallback-copy" aria-label="Rumus Muda coming soon">
          <p class="fallback-brand">Rumus Muda</p>
          <h1>Coming Soon</h1>
          <p class="fallback-promise">
            Building a new kind of tech education for people who are already
            great at what they do
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
